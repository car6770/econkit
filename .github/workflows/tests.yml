name: Full Health Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-health-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health-check:
    name: Run full EconKit health check
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          python -m pip list

      - name: Check repository structure
        run: |
          test -f src/econkit.py
          test -f src/econkit_cli.py
          test -f tests/test_econkit.py
          test -f tests/test_cli.py
          test -f data/sample_economic_data.csv
          test -f README.md
          test -f pyproject.toml
          test -f requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile src/econkit.py
          python -m py_compile src/econkit_cli.py
          python -m py_compile examples/analyze_macro_data.py
          python -m py_compile examples/analyze_macro_risk.py
          python -m py_compile examples/generate_report.py
          python -m py_compile examples/run_macro_scenarios.py
          python -m py_compile examples/run_forecasting.py
          python -m py_compile examples/run_regression.py

      - name: Run unit tests
        run: |
          python -m pytest -q

      - name: Clean previous generated outputs
        run: |
          rm -rf outputs
          mkdir -p outputs/healthcheck

      - name: Run CLI full health check
        run: |
          python src/econkit_cli.py features
          python src/econkit_cli.py validate data/sample_economic_data.csv
          python src/econkit_cli.py profile data/sample_economic_data.csv --output-dir outputs/healthcheck/profile
          python src/econkit_cli.py report data/sample_economic_data.csv --output-dir outputs/healthcheck/report
          python src/econkit_cli.py risk data/sample_economic_data.csv --output-dir outputs/healthcheck/risk
          python src/econkit_cli.py policy data/sample_economic_data.csv --output-dir outputs/healthcheck/policy
          python src/econkit_cli.py cycle data/sample_economic_data.csv --output-dir outputs/healthcheck/cycle
          python src/econkit_cli.py inflation data/sample_economic_data.csv --output-dir outputs/healthcheck/inflation
          python src/econkit_cli.py mix data/sample_economic_data.csv --output-dir outputs/healthcheck/mix
          python src/econkit_cli.py scenarios data/sample_economic_data.csv --output-dir outputs/healthcheck/scenarios --years 5 --stress-tests
          python src/econkit_cli.py forecast data/sample_economic_data.csv --output-dir outputs/healthcheck/forecasts --periods 5
          python src/econkit_cli.py ols data/sample_economic_data.csv --formula "inflation_rate ~ gdp_growth + unemployment_rate" --output-dir outputs/healthcheck/regression --robust
          python src/econkit_cli.py package data/sample_economic_data.csv --output-dir outputs/healthcheck/package --years 5
          python src/econkit_cli.py all data/sample_economic_data.csv --output-dir outputs/healthcheck/all --years 5 --stress-tests

      - name: Verify CLI outputs
        run: |
          test -f outputs/healthcheck/profile/data_quality_report.md
          test -f outputs/healthcheck/profile/data_quality_report.json
          test -f outputs/healthcheck/report/economic_report.md
          test -f outputs/healthcheck/risk/macro_risk_summary.md
          test -f outputs/healthcheck/risk/macro_risk_summary.json
          test -f outputs/healthcheck/policy/monetary_policy_summary.md
          test -f outputs/healthcheck/policy/monetary_policy_summary.json
          test -f outputs/healthcheck/policy/monetary_policy_report.md
          test -f outputs/healthcheck/cycle/business_cycle_summary.md
          test -f outputs/healthcheck/cycle/business_cycle_summary.json
          test -f outputs/healthcheck/inflation/inflation_pressure_summary.md
          test -f outputs/healthcheck/inflation/inflation_pressure_summary.json
          test -f outputs/healthcheck/mix/policy_mix_summary.md
          test -f outputs/healthcheck/mix/policy_mix_summary.json
          test -f outputs/healthcheck/scenarios/scenario_comparison.csv
          test -f outputs/healthcheck/scenarios/macro_scenario_report.md
          test -f outputs/healthcheck/scenarios/baseline_scenario.csv
          test -f outputs/healthcheck/scenarios/stagflation_scenario.csv
          test -f outputs/healthcheck/scenarios/soft_landing_scenario.csv
          test -f outputs/healthcheck/scenarios/hard_landing_scenario.csv
          test -f outputs/healthcheck/scenarios/supply_recovery_scenario.csv
          test -f outputs/healthcheck/scenarios/policy_mistake_scenario.csv
          test -f outputs/healthcheck/forecasts/indicator_forecasts.csv
          test -f outputs/healthcheck/regression/regression_report.md
          test -f outputs/healthcheck/regression/regression_result.json
          test -f outputs/healthcheck/package/reports/economic_report.md
          test -f outputs/healthcheck/package/reports/diagnostics.json
          test -f outputs/healthcheck/all/report/economic_report.md
          test -f outputs/healthcheck/all/scenarios/scenario_comparison.csv
          test -f outputs/healthcheck/all/forecasts/indicator_forecasts.csv

      - name: Run example scripts
        run: |
          python examples/analyze_macro_data.py
          python examples/analyze_macro_risk.py
          python examples/generate_report.py
          python examples/run_macro_scenarios.py
          python examples/run_forecasting.py
          python examples/run_regression.py

      - name: Verify example outputs
        run: |
          test -f outputs/examples/macro_data_summary.md
          test -f outputs/examples/correlation_matrix.csv
          test -f outputs/examples/gdp_growth_chart.png
          test -f outputs/examples/inflation_rate_chart.png
          test -f outputs/examples/macro_indicators_chart.png
          test -f outputs/examples/macro_risk_example.md
          test -f outputs/examples/macro_risk_example.json
          test -f outputs/examples/report/economic_report.md
          test -f outputs/examples/report_index.md
          test -f outputs/examples/scenarios/scenario_comparison.csv
          test -f outputs/examples/scenarios/macro_scenario_report.md
          test -f outputs/examples/scenario_dashboard.md
          test -f outputs/examples/forecasts/ar1_forecasts.csv
          test -f outputs/examples/forecasts/moving_average_forecasts.csv
          test -f outputs/examples/forecasts/forecast_summary.md
          test -f outputs/examples/regression/regression_report.md
          test -f outputs/examples/regression/regression_result.json
          test -f outputs/examples/regression/regression_summary.md

      - name: List generated outputs
        run: |
          find outputs -type f | sort
